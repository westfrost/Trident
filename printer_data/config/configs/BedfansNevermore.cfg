############### Bed Fan & Nevermore Config ###############
# Rewritten for reliability - uses timestamp-based ramp instead of
# a separate delayed gcode timer, eliminating the race condition where
# ramp_stage could be read before bedfan_fast_ramp had a chance to set it.
##########################################################

############### User Config ###############

[gcode_macro bedfanvars]
variable_threshold: 85          # Bed temp (C) at/above which fan control activates
variable_slow: 0.2              # BedFan speed while bed is still heating
variable_ramp: 0.5              # BedFan speed once bed hits target, during stabilisation delay
variable_fast: 0.8              # BedFan speed after stabilisation delay has elapsed
variable_medium: 0.35           # BedFan speed when chamber is too hot (protection mode)
variable_nevermore: 1.0         # NeverMore speed while printing
variable_nevermore_postprint: 1.0     # NeverMore speed during post-print run-on
variable_nevermore_postprint_time: 300  # How long (seconds) NeverMore keeps running after print ends
variable_chamber_limit: 63      # Chamber temp (C) that triggers protection mode (drops to medium)
variable_chamber_resume: 58     # Chamber temp (C) at which protection mode clears (hysteresis)
variable_loop_time: 2           # Seconds between control loop ticks
variable_postheat_delay: 15     # Seconds to wait after bed stabilises before going to fast speed
gcode:

############### Fans ###############

[fan_generic BedFan]
pin: PA8
kick_start_time: 0.5

[fan_generic NeverMore]
pin: PE5
kick_start_time: 0.5

############### Fan Speed Presets ###############
# These are thin wrappers so BEDFAN_UPDATE stays readable.
# They read their speed from bedfanvars at call time, so changing
# a variable mid-print takes effect immediately on the next loop tick.

[gcode_macro BedFansSlow]
gcode:
    {% set SLOW = printer["gcode_macro bedfanvars"].slow|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={SLOW}

[gcode_macro BedFansRamp]
gcode:
    {% set RAMP = printer["gcode_macro bedfanvars"].ramp|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={RAMP}

[gcode_macro BedFansMedium]
gcode:
    {% set MEDIUM = printer["gcode_macro bedfanvars"].medium|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={MEDIUM}

[gcode_macro BedFansFast]
gcode:
    {% set FAST = printer["gcode_macro bedfanvars"].fast|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={FAST}

[gcode_macro NeverMoreOn]
gcode:
    {% set SPEED = printer["gcode_macro bedfanvars"].nevermore|float %}
    SET_FAN_SPEED FAN=NeverMore SPEED={SPEED}

[gcode_macro BedFansOff]
# Turns off BedFan only. NeverMore has its own shutdown path
# so it can keep running post-print independently.
gcode:
    SET_FAN_SPEED FAN=BedFan SPEED=0

[gcode_macro AllFansOff]
# Hard stop for both fans. Used on TURN_OFF_HEATERS when no
# post-print NeverMore run-on is needed (e.g. cancelled print).
gcode:
    SET_FAN_SPEED FAN=BedFan SPEED=0
    SET_FAN_SPEED FAN=NeverMore SPEED=0

############### Runtime State ###############

[gcode_macro bedfanstate]
# ramp_time: stores the printer cputime (seconds) at which the bed
# first reached its target temperature. 0 means it hasn't happened yet.
# Using a timestamp instead of a stage integer means the control loop
# can calculate elapsed time itself with no separate timer needed.
variable_hot_chamber: 0     # 1 = chamber over limit, force medium speed until it cools
variable_ramp_time: 0       # cputime timestamp when bed first hit target. 0 = not yet.
gcode:

############### Control Logic ###############

[gcode_macro BEDFAN_UPDATE]
# Single decision-maker for fan speeds. Called by bedfanloop every
# loop_time seconds. No other macro sets fan speeds directly.
gcode:
    {% set THRESHOLD      = printer["gcode_macro bedfanvars"].threshold|int %}
    {% set CHAMBER_LIMIT  = printer["gcode_macro bedfanvars"].chamber_limit|float %}
    {% set CHAMBER_RESUME = printer["gcode_macro bedfanvars"].chamber_resume|float %}
    {% set POSTHEAT_DELAY = printer["gcode_macro bedfanvars"].postheat_delay|int %}
    {% set BED_TARGET     = printer.heater_bed.target|float %}
    {% set BED_TEMP       = printer.heater_bed.temperature|float %}
    {% set CHAMBER_TEMP   = printer["temperature_sensor chamber"].temperature|float %}
    {% set HOT            = printer["gcode_macro bedfanstate"].hot_chamber|int %}
    {% set RAMP_TIME      = printer["gcode_macro bedfanstate"].ramp_time|float %}
    {% set NOW            = printer.system_stats.cputime|float %}

    # --- Bed target below threshold: fans off, reset state ---
    {% if BED_TARGET < THRESHOLD %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
        BedFansOff

    # --- Chamber protection mode: bed fan throttled to medium ---
    # Clears automatically once chamber drops back to chamber_resume.
    {% elif HOT == 1 %}
        {% if CHAMBER_TEMP <= CHAMBER_RESUME %}
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        {% else %}
            BedFansMedium
        {% endif %}
        NeverMoreOn

    # --- Chamber just hit the limit: enter protection mode ---
    {% elif CHAMBER_TEMP >= CHAMBER_LIMIT %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=1
        BedFansMedium
        NeverMoreOn

    # --- Bed is at or near target temperature ---
    {% elif BED_TEMP >= (BED_TARGET - 1) %}
        {% if RAMP_TIME == 0 %}
            # First tick where bed has reached target.
            # Record the current time so we can measure elapsed seconds.
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE={NOW}
            BedFansRamp
        {% elif (NOW - RAMP_TIME) >= POSTHEAT_DELAY %}
            # postheat_delay seconds have elapsed since bed stabilised.
            # Safe to run at full speed now.
            BedFansFast
        {% else %}
            # Still within the stabilisation window - hold at ramp speed.
            BedFansRamp
        {% endif %}
        NeverMoreOn

    # --- Bed still heating ---
    {% else %}
        # If bed temp drops back below target (e.g. after a target change),
        # reset ramp_time so the stabilisation timer restarts cleanly.
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
        BedFansSlow
        NeverMoreOn
    {% endif %}

############### Monitoring Loop ###############

[delayed_gcode bedfanloop]
# Runs every loop_time seconds while bed target is above threshold.
# Self-cancels when bed target drops below threshold.
gcode:
    {% set THRESHOLD  = printer["gcode_macro bedfanvars"].threshold|int %}
    {% set LOOP_TIME  = printer["gcode_macro bedfanvars"].loop_time|int %}
    {% set BED_TARGET = printer.heater_bed.target|float %}

    {% if BED_TARGET >= THRESHOLD %}
        BEDFAN_UPDATE
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION={LOOP_TIME}
    {% else %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
        BedFansOff
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    {% endif %}

############### Post-Print NeverMore Run-On ###############

[delayed_gcode nevermore_postprint_off]
# Fired by NEVERMORE_POSTPRINT_START. Turns NeverMore off after the delay.
gcode:
    SET_FAN_SPEED FAN=NeverMore SPEED=0

[gcode_macro NEVERMORE_POSTPRINT_START]
# Called by PRINT_END to start the post-print NeverMore timer.
gcode:
    {% set SPEED = printer["gcode_macro bedfanvars"].nevermore_postprint|float %}
    {% set TIME  = printer["gcode_macro bedfanvars"].nevermore_postprint_time|int %}
    SET_FAN_SPEED FAN=NeverMore SPEED={SPEED}
    UPDATE_DELAYED_GCODE ID=nevermore_postprint_off DURATION={TIME}

[gcode_macro NEVERMORE_POSTPRINT_CANCEL]
# Call this if you want to stop the post-print run-on early.
gcode:
    UPDATE_DELAYED_GCODE ID=nevermore_postprint_off DURATION=0
    SET_FAN_SPEED FAN=NeverMore SPEED=0

############### Command Overrides ###############

[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set HEATER    = params.HEATER|default("None") %}
    {% set TARGET    = params.TARGET|default(0)|int %}
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}

    {% if HEATER|lower == "extruder" %}
        M104 S{TARGET}
    {% elif HEATER|lower == "heater_bed" %}
        M99140 S{TARGET}
    {% else %}
        {action_respond_info("Heater %s not supported" % HEATER)}
    {% endif %}

    {% if HEATER|lower == "heater_bed" %}
        {% if TARGET >= THRESHOLD %}
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
            BedFansSlow
            NeverMoreOn
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
        {% else %}
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
            BedFansOff
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
        {% endif %}
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set S         = params.S|int %}
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}

    {% if S >= THRESHOLD %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
        BedFansSlow
        NeverMoreOn
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
    {% else %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
        BedFansOff
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    {% endif %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}

    {% if S != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={S|int} MAXIMUM={S|int + 5}
    {% endif %}

    # Run one immediate update after bed reaches temp so ramp_time
    # gets stamped without waiting for the next loop tick.
    {% if S >= THRESHOLD %}
        BEDFAN_UPDATE
    {% endif %}

[gcode_macro M140]
rename_existing: M99140
gcode:
    {% set S = params.S|float %}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={S}

[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
# Stops the control loop, cancels any pending timers, turns off both fans.
# PRINT_END should call NEVERMORE_POSTPRINT_START after this to start the run-on.
gcode:
    SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
    SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_time VALUE=0
    UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    UPDATE_DELAYED_GCODE ID=nevermore_postprint_off DURATION=0
    AllFansOff
    _TURN_OFF_HEATERS
