[gcode_macro COLD_PULL]
gcode:
    {% set target_extruder = params.EXTRUDER|default(200)|int %}

    # Move to purge position
    G90                                      ; absolute positioning
    G28                                      ; home all axes
    Z_TILT_ADJUST
    G28 Z
    G1 X175 Y1 Z1 F6000                      ; move to cold pull position

    # Heat and extrude
    M109 S{target_extruder}                  ; wait for nozzle temp
    M83                                      ; relative extrusion
    G1 E20 F600                              ; extrude 20mm at 10mm/s

    # Begin cooling phase
    M104 S125                                ; set nozzle to 125°C (no wait)
    M106 S255                                ; part cooling fan to max

    # Wait for nozzle to reach 125°C, then pull
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=125
    G1 Z25 F600                              ; pull up to Z25
    M106 S0                                  ; part cooling fan off